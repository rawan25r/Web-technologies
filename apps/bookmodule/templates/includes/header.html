{% with request.resolver_match.url_name as url_name %}
<div class="topnav">
    <!-- الصفحة الرئيسية -->
    <a class="{% if url_name == 'index' %}active{% endif %}" href="{% url 'books:index' %}">Home</a>

    <!-- قائمة الكتب -->
    <a class="{% if url_name == 'list_books' %}active{% endif %}" href="{% url 'books:list_books' %}">List Books</a>

    <!-- صفحة About -->
    <a class="{% if url_name == 'aboutus' %}active{% endif %}" href="{% url 'books:aboutus' %}">About</a>

    <!-- صفحة البحث -->
    <a class="{% if url_name == 'search_books' %}active{% endif %}" href="{% url 'books:search_books' %}">Search</a>

    <!-- صفحات HTML5 التعليمية -->
    <a class="{% if url_name == 'links' %}active{% endif %}" href="{% url 'books:links' %}">HTML Links</a>
    <a class="{% if url_name == 'text_formatting' %}active{% endif %}" href="{% url 'books:text_formatting' %}">Text Formatting</a>
    <a class="{% if url_name == 'listing' %}active{% endif %}" href="{% url 'books:listing' %}">Listing</a>
    <a class="{% if url_name == 'tables' %}active{% endif %}" href="{% url 'books:tables' %}">Tables</a>
</div>
{% endwith %}
